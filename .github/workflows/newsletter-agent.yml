name: Daily AI Newsletter Digest

on:
  schedule:
    # Run every day at 8 AM UTC (adjust timezone if needed)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  newsletter-summary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run newsletter agent
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          # Decode Gmail credentials from base64
          echo "$GMAIL_CREDENTIALS" | base64 --decode > credentials.json
          python newsletter_agent.py
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-logs
          path: |
            newsletter_archive.jsonl
          retention-days: 30
